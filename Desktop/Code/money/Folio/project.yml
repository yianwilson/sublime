name: Folio
options:
  bundleIdPrefix: com.folio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

schemes:
  FolioTests:
    build:
      targets:
        FolioTests: [test]
    test:
      targets:
        - FolioTests

targets:
  Folio:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Folio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.folio.app
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Folio/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: FolioWidget
        embed: true
    scheme:
      testTargets:
        - FolioTests

  FolioTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FolioTests
    dependencies:
      - target: Folio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.folio.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"

  FolioWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FolioWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.folio.app.widget
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
