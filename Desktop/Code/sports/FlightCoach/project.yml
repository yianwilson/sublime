name: FlightCoach
options:
  bundleIdPrefix: com.flightcoach
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  FlightCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FlightCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flightcoach.app
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: FlightCoach/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: CoreML.framework
      - sdk: Photos.framework
      - sdk: PhotosUI.framework
      - sdk: CoreData.framework
    scheme:
      testTargets:
        - FlightCoachTests
        - FlightCoachUITests
      gatherCoverageData: false

  FlightCoachUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FlightCoachUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flightcoach.uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FlightCoach

  FlightCoachTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FlightCoachTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flightcoach.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FlightCoach
